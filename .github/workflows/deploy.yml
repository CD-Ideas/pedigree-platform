- name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      cd ~/pedigree-platform
      git pull origin main
      npm install
      npx prisma generate
      npx prisma migrate deploy
      npm run build
      pm2 restart all || pm2 start dist/server.js --name pedigree-platform
